name: Bluesky Auto Poster
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      caption_mode:
        description: "Caption mode"
        default: "random"
        type: choice
        options: ["random", "filename"]
      caption_sheet_name:
        description: "Random captions tab (used when mode=random)"
        default: "assian"
      filename_map_tab:
        description: "Filename→caption tab (used when mode=filename)"
        default: "FileMap"
      image_ratio:
        description: "Image post % (e.g. 60)"
        default: "60"
      video_ratio:
        description: "Video post % (e.g. 40)"
        default: "40"
      no_link_ratio:
        description: "% of posts without link (e.g. 20)"
        default: "20"
      hashtags_enabled_image:
        description: "Hashtags on image posts?"
        default: "true"
        type: choice
        options: ["true", "false"]
      hashtags_enabled_video:
        description: "Hashtags on video posts?"
        default: "false"
        type: choice
        options: ["true", "false"]
      post_link_url:
        description: "Link to include in posts (e.g. kr.teentoday.cfd)"
        default: "kr.teentoday.cfd"

concurrency:
  group: bluesky-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib atproto
      - name: Run poster loop
        run: python -u post_bluesky.py
        env:
          PYTHONUNBUFFERED: "1"
          BSKY_HANDLE: ${{ vars.BSKY_HANDLE }}
          BSKY_APP_PW: ${{ secrets.BSKY_APP_PW }}
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          UPLOAD_FOLDER_ID: ${{ secrets.UPLOAD_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          CAPTION_MODE:            ${{ github.event.inputs.caption_mode            || vars.CAPTION_MODE            || 'random' }}
          CAPTION_SHEET_NAME:      ${{ github.event.inputs.caption_sheet_name      || vars.CAPTION_SHEET_NAME      || 'assian' }}
          FILENAME_MAP_TAB:        ${{ github.event.inputs.filename_map_tab        || vars.FILENAME_MAP_TAB        || 'FileMap' }}
          IMAGE_RATIO:             ${{ github.event.inputs.image_ratio             || vars.IMAGE_RATIO             || '60' }}
          VIDEO_RATIO:             ${{ github.event.inputs.video_ratio             || vars.VIDEO_RATIO             || '40' }}
          NO_LINK_RATIO:           ${{ github.event.inputs.no_link_ratio           || vars.NO_LINK_RATIO           || '20' }}
          HASHTAGS_ENABLED_IMAGE:  ${{ github.event.inputs.hashtags_enabled_image  || vars.HASHTAGS_ENABLED_IMAGE  || 'true' }}
          HASHTAGS_ENABLED_VIDEO:  ${{ github.event.inputs.hashtags_enabled_video  || vars.HASHTAGS_ENABLED_VIDEO  || 'false' }}
          POST_LINK_URL:           ${{ github.event.inputs.post_link_url           || vars.POST_LINK_URL           || 'kr.teentoday.cfd' }}
      - name: Disable workflow on permanent failure
        if: failure()
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
